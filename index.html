<!DOCTYPE html>
<html>
<head>
  <title>Travel Booking App</title>
</head>
<body>

  <h1>Flights</h1>

  <div id="flights"></div>

  <script>
    fetch("http://localhost:8000/flights")
      .then(res => res.json())
      .then(data => {
        const flightsDiv = document.getElementById("flights");

        data.forEach(flight => {
          const div = document.createElement("div");

          div.innerHTML = `
            <h3>${flight.flight_name}</h3>
            <p>${flight.source} → ${flight.destination}</p>
            <p>Price: ₹${flight.price}</p>
            <p>${flight.availability}</p>
            <hr/>
          `;

          flightsDiv.appendChild(div);
        });
      });
  </script>

</body>
</html>
